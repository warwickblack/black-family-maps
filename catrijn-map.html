<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Groote Catrijn: Places and Voyages</title>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--header-h:60px;--region-h:40px;--scrub-h:36px;--sidebar-w:320px;--font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}
body{font-family:var(--font);overflow:hidden;height:100vh;background:#f5f0eb}
#header{height:var(--header-h);background:#1a1a2e;color:#fff;display:flex;align-items:center;padding:0 16px;gap:16px;z-index:1000;position:relative}
#header h1{font-size:17px;font-weight:600;white-space:nowrap}
#header .sub{font-size:11px;color:#b0a89f;margin-left:-8px;white-space:nowrap}
#search-wrap{margin-left:auto;display:flex;align-items:center;gap:6px;background:rgba(255,255,255,0.12);border-radius:6px;padding:2px 8px}
#search-wrap input{background:none;border:none;color:#fff;font-size:14px;width:180px;outline:none;font-family:var(--font)}
#search-wrap input::placeholder{color:#aaa}
#search-info{color:#b0a89f;font-size:11px;white-space:nowrap}
.search-nav{background:none;border:none;color:#fff;cursor:pointer;font-size:14px;padding:2px 4px}
.search-nav:hover{color:#f0c040}
#region-bar{height:var(--region-h);background:#24243e;display:flex;align-items:center;gap:6px;padding:0 12px;overflow-x:auto;-webkit-overflow-scrolling:touch;z-index:999;position:relative}
#region-bar::-webkit-scrollbar{height:0}
.rpill{font-size:11px;padding:4px 10px;border-radius:12px;cursor:pointer;white-space:nowrap;border:2px solid transparent;color:#fff;opacity:.85;transition:all .2s}
.rpill:hover,.rpill.active{opacity:1;border-color:#fff;transform:scale(1.05)}
#main{display:flex;height:calc(100vh - var(--header-h) - var(--region-h) - var(--scrub-h));position:relative}
#sidebar{width:var(--sidebar-w);background:#fff;box-shadow:2px 0 12px rgba(0,0,0,.12);z-index:800;display:flex;flex-direction:column;overflow:hidden;transition:margin-left .3s}
#sidebar.hidden{margin-left:calc(-1 * var(--sidebar-w))}
#sidebar-toggle{position:absolute;left:0;top:50%;transform:translateY(-50%);z-index:801;background:#1a1a2e;color:#fff;border:none;border-radius:0 6px 6px 0;padding:8px 4px;cursor:pointer;font-size:14px;transition:left .3s}
#sidebar.hidden~#sidebar-toggle{left:0}
#sidebar:not(.hidden)~#sidebar-toggle{left:var(--sidebar-w)}
.tabs{display:flex;border-bottom:2px solid #eee}
.tab{flex:1;padding:8px;text-align:center;font-size:12px;font-weight:600;cursor:pointer;border-bottom:3px solid transparent;color:#666;transition:all .2s}
.tab.active{color:#1a1a2e;border-bottom-color:#c2641f}
.tab-body{flex:1;overflow-y:auto;padding:8px}
.tab-content{display:none}
.tab-content.active{display:block}
.card{border:1px solid #e8e0d8;border-radius:8px;margin-bottom:8px;overflow:hidden;transition:box-shadow .2s}
.card:hover{box-shadow:0 2px 8px rgba(0,0,0,.1)}
.card-head{padding:8px 10px;cursor:pointer;display:flex;align-items:center;gap:8px;font-size:12px}
.card-head .arr{transition:transform .2s;font-size:10px;color:#999}
.card.open .arr{transform:rotate(90deg)}
.card-body{display:none;padding:8px 10px;font-size:12px;line-height:1.6;border-top:1px solid #f0e8e0;color:#444}
.card.open .card-body{display:block}
.swatch{width:14px;height:4px;border-radius:2px;display:inline-block}
.clink{color:#1a6db3;cursor:pointer;text-decoration:underline}
.clink:hover{color:#c2641f}
.play-btn{display:inline-block;margin-top:6px;padding:4px 12px;background:#1a1a2e;color:#fff;border:none;border-radius:4px;cursor:pointer;font-size:11px;font-family:var(--font)}
.play-btn:hover{background:#2a2a4e}
.place-card{display:flex;align-items:center;gap:8px;padding:6px 8px;border-bottom:1px solid #f0e8e0;cursor:pointer;font-size:12px;transition:background .15s}
.place-card:hover{background:#faf6f2}
.place-card .badge{font-size:9px;padding:1px 5px;border-radius:3px;color:#fff}
.place-card .rg{font-size:9px;color:#888}
.filter-bar{display:flex;gap:4px;padding:6px 8px;flex-wrap:wrap;border-bottom:1px solid #eee}
.fbtn{font-size:10px;padding:3px 8px;border-radius:10px;border:1px solid #ddd;background:#fff;cursor:pointer;font-family:var(--font)}
.fbtn.on{background:#1a1a2e;color:#fff;border-color:#1a1a2e}
.sort-bar{display:flex;gap:4px;padding:4px 8px;border-bottom:1px solid #eee}
.sbtn{font-size:10px;padding:2px 6px;border:none;background:none;cursor:pointer;color:#888;font-family:var(--font)}
.sbtn.on{color:#1a1a2e;font-weight:700}
#map{flex:1;z-index:1}
#scrubber{height:var(--scrub-h);background:#1a1a2e;display:flex;align-items:center;z-index:999;position:relative}
.era{flex:1;height:100%;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:10px;color:#fff;opacity:.7;transition:all .2s;border-right:1px solid rgba(255,255,255,.15)}
.era:last-child{border-right:none}
.era:hover,.era.active{opacity:1;font-weight:700}
.legend-box{position:absolute;bottom:calc(var(--scrub-h) + 8px);left:8px;z-index:900;background:rgba(255,255,255,.95);border-radius:6px;padding:8px 10px;font-size:10px;box-shadow:0 1px 6px rgba(0,0,0,.15);line-height:1.8;max-width:180px}
.legend-box h4{font-size:11px;margin-bottom:4px;color:#1a1a2e}
.legend-row{display:flex;align-items:center;gap:6px}
.legend-svg{width:16px;height:16px;flex-shrink:0}
.sz-row{display:flex;align-items:center;gap:8px;margin-top:4px;padding-top:4px;border-top:1px solid #eee}
.sz-dot{border-radius:50%;background:#666}
.highlight{background:rgba(255,200,0,.25);border-radius:2px}
.leaflet-popup-content{font-family:var(--font);font-size:13px;line-height:1.5;max-width:280px}
.popup-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:3px;color:#fff;margin:4px 0}
.popup-routes{margin-top:6px;font-size:11px;color:#666}
.popup-route-badge{display:inline-block;font-size:9px;padding:1px 6px;border-radius:3px;color:#fff;margin:2px 2px}
.minimap{position:absolute;bottom:calc(var(--scrub-h) + 8px);right:8px;z-index:900;width:140px;height:100px;border-radius:6px;overflow:hidden;box-shadow:0 1px 6px rgba(0,0,0,.2);border:2px solid #fff}
#minimap{width:100%;height:100%}
@media(max-width:768px){
 #sidebar{position:absolute;left:0;top:0;height:100%;width:280px}
 #sidebar.hidden{margin-left:-280px}
 #sidebar:not(.hidden)~#sidebar-toggle{left:280px}
 #header h1{font-size:14px}
 #header .sub{display:none}
 #search-wrap input{width:120px;font-size:16px}
 .rpill{min-height:44px;display:flex;align-items:center}
 #main{height:calc(100vh - var(--header-h) - var(--region-h) - var(--scrub-h))}
 #map{min-height:300px}
 .play-btn,.fbtn,.sbtn,.tab,.card-head,.place-card,.clink,.search-nav,.era{min-height:44px;display:flex;align-items:center;justify-content:center}
}
</style>
</head>

<div id="header">

 </div>

</div>

// Build name index for cross-linking
const nameIndex={};
DATA.forEach((p,i)=>{nameIndex[p.n.toLowerCase()]=i;});
// Sort names longest first for replacement
const sortedNames=DATA.map(p=>p.n).sort((a,b)=>b.length-a.length);

function crossLink(text){
 let out=text;
 sortedNames.forEach(name=>{
  const re=new RegExp('(?<!<[^>]*)\\b'+name.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b','g');
  out=out.replace(re,'<span class="clink" onclick="flyToPlace(\''+name.replace(/'/g,"\\'")+'\')">' + name + '</span>');
 });
 return out;
}

function flyToPlace(name){
 const idx=nameIndex[name.toLowerCase()];
 if(idx===undefined)return;
 const p=DATA[idx];
 const zoom=p.r.includes('ocean')?4:(p.r==='Europe'?6:9);
 map.flyTo([p.lat,p.lon],zoom,{duration:1.2});
 setTimeout(()=>{if(markers[idx])markers[idx].openPopup();},1300);
}

// SVG marker factory
function makeSVG(shape,color,sz){
 const sizes={L:{icon:16,r:{circle:7,ring:5,dot:5}},M:{icon:12,r:{circle:5,ring:4,dot:4}},S:{icon:8,r:{circle:4,ring:3,dot:3}}};
 const s=sizes[sz]||sizes.M;
 const r=s.r;
 let inner='';
 switch(shape){
  case 'circle': inner=`<circle cx="8" cy="8" r="${r.circle}" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  case 'triangle': inner=`<polygon points="8,2 14,14 2,14" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  case 'diamond': inner=`<polygon points="8,1 15,8 8,15 1,8" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  case 'ring': inner=`<circle cx="8" cy="8" r="${r.ring}" fill="none" stroke="${color}" stroke-width="3"/>`; break;
  case 'dot': inner=`<circle cx="8" cy="8" r="${r.dot}" fill="${color}" stroke="#fff" stroke-width="1"/>`; break;
  case 'pin': inner=`<path d="M8,1 C4,1 1,4 1,7.5 C1,12 8,15 8,15 S15,12 15,7.5 C15,4 12,1 8,1Z" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  default: inner=`<circle cx="8" cy="8" r="${r.circle}" fill="${color}" stroke="#fff" stroke-width="1.5"/>`;
 }
 const svg=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="${s.icon}" height="${s.icon}">${inner}</svg>`;
 const a=s.icon/2;
 return L.divIcon({html:svg,className:'',iconSize:[s.icon,s.icon],iconAnchor:[a,a],popupAnchor:[0,-a]});
}

function makeShapeSVG(shape,color){
 let inner='';
 switch(shape){
  case 'circle': inner=`<circle cx="8" cy="8" r="6" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  case 'triangle': inner=`<polygon points="8,2 14,14 2,14" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  case 'diamond': inner=`<polygon points="8,1 15,8 8,15 1,8" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
  case 'ring': inner=`<circle cx="8" cy="8" r="5" fill="none" stroke="${color}" stroke-width="3"/>`; break;
  case 'dot': inner=`<circle cx="8" cy="8" r="4" fill="${color}" stroke="#fff" stroke-width="1"/>`; break;
  case 'pin': inner=`<path d="M8,1 C4,1 1,4 1,7.5 C1,12 8,15 8,15 S15,12 15,7.5 C15,4 12,1 8,1Z" fill="${color}" stroke="#fff" stroke-width="1.5"/>`; break;
 }
 return `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 16" width="16" height="16">${inner}</svg>`;
}

 ROUTES.forEach(r=>{
  r.pts.forEach(pt=>{
   const d=Math.sqrt(Math.pow(pt[0]-p.lat,2)+Math.pow(pt[1]-p.lon,2));
   if(d<2){routeBadges+='<span class="popup-route-badge" style="background:'+r.color+'">'+r.name.split(':')[0]+'</span>';return;}
  });
 });
 // Deduplicate route badges
 const seen={};let uniqueBadges='';
 routeBadges.replace(/<span[^>]*>([^<]+)<\/span>/g,(m,t)=>{if(!seen[t]){seen[t]=1;uniqueBadges+=m;}});

 let storyText=crossLink(p.c);
 let html=`<b style="font-size:14px">${p.n}</b><br>`;
 html+=`<span class="popup-badge" style="background:${BADGE[p.s]}">${p.s}</span><br>`;
 html+=`<b>Now:</b> ${p.m}<br>`;
 html+=`<div style="margin-top:4px">${storyText}</div>`;
 if(uniqueBadges)html+=`<div class="popup-routes">Part of: ${uniqueBadges}</div>`;
 return html;
}

// Init map
const map=L.map('map',{worldCopyJump:true,zoomControl:true}).setView([5,55],3);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{
 attribution:'&copy; <a href="https://www.openstreetmap.org/copyright" target="_blank" rel="noopener">OpenStreetMap</a> &copy; <a href="https://carto.com/" target="_blank" rel="noopener">CARTO</a>',
 subdomains:'abcd',maxZoom:19
}).addTo(map);

// Routes
const routeLines=[];
const routeDecorators=[];
ROUTES.forEach((r,i)=>{
 const ln=L.polyline(r.pts,{color:r.color,weight:2.5,dashArray:r.dash,opacity:0.7}).addTo(map);
 ln.bindTooltip(r.name,{sticky:true});
 routeLines.push(ln);
 const dec=L.polylineDecorator(ln,{patterns:[
  {offset:'10%',repeat:80,symbol:L.Symbol.arrowHead({pixelSize:8,polygon:false,pathOptions:{stroke:true,color:r.color,weight:2,opacity:0.8}})}
 ]}).addTo(map);
 routeDecorators.push(dec);
});

// Markers
const markers={};
DATA.forEach((p,i)=>{
 const icon=makeSVG(p.shape,COLORS[p.r],p.sz);
 const m=L.marker([p.lat,p.lon],{icon:icon});
 m.bindTooltip(`<b>${p.n}</b><br><span style="display:inline-block;padding:1px 5px;border-radius:3px;color:#fff;font-size:9px;background:${BADGE[p.s]}">${p.s}</span><br><span style="font-size:11px">${p.c.split('.')[0]}.</span>`,{direction:'top',offset:[0,-4]});
 m.bindPopup(popupHTML(p),{maxWidth:300});
 m.addTo(map);
 markers[i]=m;
});

// Region bar
const regionBar=document.getElementById('region-bar');
Object.keys(COLORS).forEach(r=>{
 const pill=document.createElement('span');
 pill.className='rpill';
 pill.style.background=COLORS[r];
 pill.textContent=r;
 pill.onclick=()=>{
  document.querySelectorAll('.rpill').forEach(p=>p.classList.remove('active'));
  pill.classList.add('active');
  map.flyToBounds(REGION_BOUNDS[r],{padding:[30,30],duration:1});
 };
 regionBar.appendChild(pill);
});

// Sidebar tabs
document.querySelectorAll('.tab').forEach(t=>{
 t.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tab-content').forEach(x=>x.classList.remove('active'));
  t.classList.add('active');
  document.getElementById(t.dataset.tab+'-tab').classList.add('active');
 };
});

// Voyages tab
const voyTab=document.getElementById('voyages-tab');
ROUTES.forEach((r,i)=>{
 const card=document.createElement('div');
 card.className='card';
 const shortName=r.name.split(':');
 card.innerHTML=`
  <div class="card-head" onclick="this.parentElement.classList.toggle('open')">
   <span class="arr">&#9654;</span>
   <span class="swatch" style="background:${r.color}"></span>
   <span>${shortName[0]}</span>
  </div>
  <div class="card-body">
   <div style="margin-bottom:6px;color:#666">${r.name}</div>
   <div class="waypoints" id="waypoints-${i}"></div>
   <button class="play-btn" id="play-${i}" onclick="playVoyage(${i})">&#9654; Play this voyage</button>
  </div>`;
 voyTab.appendChild(card);
 // Populate waypoints
 const wp=card.querySelector(`#waypoints-${i}`);
 r.pts.forEach((pt,j)=>{
  // Find nearest place
  let best=null,bestD=Infinity;
  DATA.forEach(p=>{
   const d=Math.sqrt(Math.pow(p.lat-pt[0],2)+Math.pow(p.lon-pt[1],2));
   if(d<bestD){bestD=d;best=p;}
  });
  const label=bestD<2?best.n:`Waypoint ${j+1} (${pt[0].toFixed(1)}, ${pt[1].toFixed(1)})`;
  const link=document.createElement('div');
  link.style.cssText='padding:2px 0';
  if(bestD<2){
   link.innerHTML=`<span class="clink" onclick="flyToPlace('${best.n.replace(/'/g,"\\'")}')">${j+1}. ${label}</span>`;
  } else {
   link.innerHTML=`<span style="color:#999">${j+1}. ${label}</span>`;
  }
  wp.appendChild(link);
 });
});

// Voyage animation
let animTimer=null, animRoute=-1;
function playVoyage(idx){
 if(animTimer){stopVoyage();if(animRoute===idx)return;}
 animRoute=idx;
 const btn=document.getElementById('play-'+idx);
 btn.textContent='Stop';
 btn.onclick=()=>stopVoyage();
 const pts=ROUTES[idx].pts;
 let step=0;
 const shipIcon=L.divIcon({html:'<div style="font-size:20px">&#9981;</div>',className:'',iconSize:[24,24],iconAnchor:[12,12]});
 const ship=L.marker(pts[0],{icon:shipIcon}).addTo(map);
 map.flyTo(pts[0],5,{duration:0.8});
 function advance(){
  if(step>=pts.length){stopVoyage();return;}
  ship.setLatLng(pts[step]);
  map.panTo(pts[step],{animate:true,duration:0.8});
  // Find nearby place
  let best=null,bestD=Infinity;
  DATA.forEach(p=>{
   const d=Math.sqrt(Math.pow(p.lat-pts[step][0],2)+Math.pow(p.lon-pts[step][1],2));
   if(d<bestD){bestD=d;best=p;}
  });
  if(bestD<2){
   ship.bindTooltip(best.n+': '+best.c,{permanent:true,direction:'top'}).openTooltip();
  } else {
   ship.unbindTooltip();
  }
  step++;
  animTimer=setTimeout(advance,3000);
 }
 advance();
 window._animShip=ship;
}
function stopVoyage(){
 clearTimeout(animTimer);animTimer=null;
 if(window._animShip){map.removeLayer(window._animShip);window._animShip=null;}
 ROUTES.forEach((r,i)=>{
  const btn=document.getElementById('play-'+i);
  btn.textContent='▶ Play this voyage';
  btn.onclick=()=>playVoyage(i);
 });
 animRoute=-1;
}

// Story tab
const storyTab=document.getElementById('story-tab');
STORY.forEach(s=>{
 const card=document.createElement('div');
 card.className='card';
 card.innerHTML=`
  <div class="card-head" onclick="this.parentElement.classList.toggle('open')">
   <span class="arr">&#9654;</span>
   <span style="color:#888;font-size:11px;min-width:70px">${s.date}</span>
   <span>${s.label}</span>
  </div>
  <div class="card-body">
   <div style="margin-bottom:6px">${s.text}</div>
   <div>${s.places.map(pn=>'<span class="clink" onclick="flyToPlace(\''+pn.replace(/'/g,"\\'")+'\')" style="margin-right:6px">'+pn+'</span>').join('')}</div>
  </div>`;
 storyTab.appendChild(card);
});

// Places tab
let placeFilter='all', placeSort='name';
const statusList=['Same','Name changed','Vanished, site known','Uncertain'];
const filterBar=document.getElementById('status-filters');
const allBtn=document.createElement('button');
allBtn.className='fbtn on';allBtn.textContent='All';
allBtn.onclick=()=>{placeFilter='all';renderPlaces();document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));allBtn.classList.add('on');};
filterBar.appendChild(allBtn);
statusList.forEach(st=>{
 const btn=document.createElement('button');
 btn.className='fbtn';
 btn.innerHTML=`<span style="display:inline-block;width:8px;height:8px;border-radius:50%;background:${BADGE[st]};margin-right:3px"></span>${st}`;
 btn.onclick=()=>{placeFilter=st;renderPlaces();document.querySelectorAll('.fbtn').forEach(b=>b.classList.remove('on'));btn.classList.add('on');};
 filterBar.appendChild(btn);
});

function sortPlaces(by){
 placeSort=by;
 document.querySelectorAll('.sbtn').forEach(b=>b.classList.remove('on'));
 document.querySelector(`.sbtn[onclick="sortPlaces('${by}')"]`).classList.add('on');
 renderPlaces();
}

function renderPlaces(){
 const list=document.getElementById('places-list');
 list.innerHTML='';
 let items=DATA.map((p,i)=>({p,i}));
 if(placeFilter!=='all')items=items.filter(x=>x.p.s===placeFilter);
 if(placeSort==='name')items.sort((a,b)=>a.p.n.localeCompare(b.p.n));
 else items.sort((a,b)=>a.p.r.localeCompare(b.p.r)||a.p.n.localeCompare(b.p.n));
 items.forEach(({p,i})=>{
  const div=document.createElement('div');
  div.className='place-card';
  div.setAttribute('data-idx',i);
  div.innerHTML=`${makeShapeSVG(p.shape,COLORS[p.r])}<div style="flex:1"><div>${p.n}</div><div class="rg">${p.r}</div></div><span class="badge" style="background:${BADGE[p.s]}">${p.s}</span>`;
  div.onclick=()=>flyToPlace(p.n);
  list.appendChild(div);
 });
}
renderPlaces();

// Scrubber
const scrubber=document.getElementById('scrubber');
ERAS.forEach(e=>{
 const div=document.createElement('div');
 div.className='era';
 div.style.background=e.color;
 div.textContent=e.label;
 div.onclick=()=>{
  document.querySelectorAll('.era').forEach(x=>x.classList.remove('active'));
  div.classList.add('active');
  if(REGION_BOUNDS[e.region])map.flyToBounds(REGION_BOUNDS[e.region],{padding:[30,30],duration:1});
 };
 scrubber.appendChild(div);
});

// Legend
const legend=document.getElementById('legend');
const shapes=[['circle','Settlement / City'],['triangle','Conflict / Event'],['diamond','Fort / Institution'],['ring','Origin / Homeland'],['dot','Geography / Feature'],['pin','Home / Farm / Burial']];
let legendHTML='<h4>Marker shapes</h4>';
shapes.forEach(([sh,lbl])=>{
 legendHTML+=`<div class="legend-row"><span class="legend-svg">${makeShapeSVG(sh,'#666')}</span>${lbl}</div>`;
});
legendHTML+=`<div class="sz-row"><span class="sz-dot" style="width:14px;height:14px"></span> Major <span class="sz-dot" style="width:10px;height:10px"></span> Medium <span class="sz-dot" style="width:6px;height:6px"></span> Minor</div>`;
legend.innerHTML=legendHTML;

// Minimap
const minimap=L.map('minimap',{zoomControl:false,attributionControl:false,dragging:false,scrollWheelZoom:false,doubleClickZoom:false,touchZoom:false}).setView([0,40],1);
L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png',{subdomains:'abcd',maxZoom:4}).addTo(minimap);
const miniRect=L.rectangle([[0,0],[0,0]],{color:'#c2641f',weight:1,fillOpacity:0.15}).addTo(minimap);
function updateMinimap(){
 const b=map.getBounds();
 miniRect.setBounds(b);
}
map.on('moveend',updateMinimap);
map.on('zoomend',updateMinimap);
setTimeout(updateMinimap,500);

// Search
const qInput=document.getElementById('q');
const searchInfo=document.getElementById('search-info');
let searchMatches=[], searchIdx=-1;

function doSearch(){
 const q=qInput.value.toLowerCase().trim();
 searchMatches=[];searchIdx=-1;
 // Clear highlights
 document.querySelectorAll('.place-card').forEach(c=>c.classList.remove('highlight'));
 if(!q){searchInfo.textContent='';return;}
 DATA.forEach((p,i)=>{
  if(p.n.toLowerCase().includes(q)||p.m.toLowerCase().includes(q)||p.c.toLowerCase().includes(q)){
   searchMatches.push(i);
  }
 });
 // Also search routes
 ROUTES.forEach((r,i)=>{
  if(r.name.toLowerCase().includes(q)){/* route match, could highlight */}
 });
 if(searchMatches.length){
  searchIdx=0;
  goToMatch();
 }
 searchInfo.textContent=searchMatches.length?`${searchIdx+1} of ${searchMatches.length}`:'0 results';
 // Highlight in places tab
 document.querySelectorAll('.place-card').forEach(c=>{
  const idx=parseInt(c.getAttribute('data-idx'));
  if(searchMatches.includes(idx))c.classList.add('highlight');
 });
}

function goToMatch(){
 if(searchMatches.length===0)return;
 const idx=searchMatches[searchIdx];
 const p=DATA[idx];
 map.flyTo([p.lat,p.lon],p.r.includes('ocean')?4:9,{duration:0.8});
 setTimeout(()=>{if(markers[idx])markers[idx].openPopup();},900);
 searchInfo.textContent=`${searchIdx+1} of ${searchMatches.length}`;
}

qInput.addEventListener('input',doSearch);
document.getElementById('nextMatch').onclick=()=>{
 if(searchMatches.length===0)return;
 searchIdx=(searchIdx+1)%searchMatches.length;
 goToMatch();
};
document.getElementById('prevMatch').onclick=()=>{
 if(searchMatches.length===0)return;
 searchIdx=(searchIdx-1+searchMatches.length)%searchMatches.length;
 goToMatch();
};

// Keyboard
document.addEventListener('keydown',e=>{
 if(e.key==='Escape'){
  map.closePopup();
  const sb=document.getElementById('sidebar');
  if(!sb.classList.contains('hidden')&&window.innerWidth<=768)sb.classList.add('hidden');
 }
});

window.flyToPlace=flyToPlace;
window.sortPlaces=sortPlaces;
</script>
